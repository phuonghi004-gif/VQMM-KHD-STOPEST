<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn - STOPEST VIỆT NAM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Khu vực Logo công ty -->
        <div class="logo">
            <img src="logo.png" alt="Stopest Logo" class="company-logo">
            <h1>STOPEST VIỆT NAM</h1>
            <p>Chương trình tri ân khách hàng</p>
        </div>

        <div class="wheel-card">
            <h3>🎁 Vòng Quay May Mắn</h3>
            <p class="subtitle" id="status-message">Nhập thông tin để nhận 01 lượt quay và có cơ hội nhận ưu đãi hấp dẫn.</p>
            
            <!-- Khung nhập liệu thông tin khách hàng -->
            <div class="input-group" id="input-fields">
                <input type="text" id="fullname" placeholder="Họ và tên">
                <input type="tel" id="phone" placeholder="Số điện thoại">
            </div>

            <!-- Khung bọc vòng quay Canvas -->
            <div class="wheel-wrapper">
                <div class="pointer"></div>
                <canvas id="wheelCanvas" width="350" height="350"></canvas>
            </div>

            <button id="spin-btn" onclick="startSpin()">🎡 QUAY NGAY</button>

            <!-- Hộp thông báo kết quả trúng thưởng -->
            <div id="result-box" class="result-box hidden">
                <h3>🎉 Chúc mừng!</h3>
                <p id="result-text">Bạn nhận được ưu đãi</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
